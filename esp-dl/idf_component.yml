version: "3.3.1"
license: "MIT"
targets:
  - esp32
  - esp32c2
  - esp32c3
  - esp32c5
  - esp32c6
  - esp32p4
  - esp32s2
  - esp32s3
description: esp-dl is a lightweight and efficient neural network inference framework designed specifically for ESP series chips.
url: https://github.com/espressif/esp-dl/tree/master/esp-dl
dependencies: 
  idf:
    matches:
      - if: target in ["esp32", "esp32c2", "esp32c3", "esp32c6", "esp32p4", "esp32s2", "esp32s3"]
        version: ">=5.3"
      - if: "target == esp32c5"
        version: ">=5.5"
  espressif/esp_new_jpeg: "^0.6.1"
  espressif/dl_fft: ">=0.3.1"
  espressif/esp-dsp: "==1.8.0"
examples:
  - path: ../examples/cat_detect
  - path: ../examples/color_detect
  - path: ../examples/dog_detect
  - path: ../examples/hand_detect
  - path: ../examples/hand_gesture_recognition
  - path: ../examples/human_face_detect
  - path: ../examples/human_face_recognition
  - path: ../examples/mobilenetv2_cls
  - path: ../examples/motion_detect
  - path: ../examples/pedestrian_detect
  - path: ../examples/speaker_verification
  - path: ../examples/tutorial/how_to_deploy_streaming_model
  - path: ../examples/tutorial/how_to_load_test_profile_model/model_in_flash_partition
  - path: ../examples/tutorial/how_to_load_test_profile_model/model_in_flash_rodata
  - path: ../examples/tutorial/how_to_load_test_profile_model/model_in_sdcard
  - path: ../examples/tutorial/how_to_run_model
  - path: ../examples/yolo11_detect
  - path: ../examples/yolo11_pose
  - path: ../examples/yolo26_detect